name: Deploy Backend to render

on:
   push:
        branches: [ main ]

jobs:
     deploy:
           runs-on: ubantu-latest

           steps:
               - name: Checkout Code 
                 uses: action/checkout@v4     
                
               - name : Deploy to Render
                 run: |
                    curl -X POST ${{ secret.SECRET_RENDER_HOOK }}